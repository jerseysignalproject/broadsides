<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broadsides! Unified Hex Command</title>
    <style>
        :root {
            --sea: #2980b9;
            --island: #27ae60;
            --gold: #f1c40f;
            --player: #3498db;
            --enemy-hidden: #2980b9;
            --ts: 48px; 
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #ui-layer {
            width: 100%;
            background: #5d4037;
            padding: 10px;
            border-bottom: 4px ridge #8d6e63;
            text-align: center;
            box-sizing: border-box;
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .stats { display: flex; justify-content: space-around; font-size: 0.8rem; font-weight: bold; }
        .captain-notice { color: var(--gold); margin-top: 5px; font-size: 0.9rem; }

        #map-container {
            padding: 20px;
            margin: 0 auto;
            position: relative;
            overflow: auto;
            max-width: 100vw;
            transition: transform 0.1s;
        }

        #grid-root { position: relative; }

        .hex {
            position: absolute;
            width: var(--ts);
            height: var(--ts);
            background-color: var(--sea);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: filter 0.2s, transform 0.1s;
            user-select: none;
        }

        .hex:hover { filter: brightness(1.3); transform: scale(1.05); z-index: 10; }
        .hex.player-ship { background-color: #7f8c8d; box-shadow: inset 0 0 10px #000; }
        .hex.island { background-color: var(--island); cursor: default; }
        .hex.hit { background-color: #e74c3c !important; color: white; animation: flicker 0.5s infinite; }
        .hex.miss { background-color: #34495e !important; color: #95a5a6; }
        .hex.treasure { background-color: #8e44ad !important; animation: pulse 1s infinite; }

        @keyframes flicker { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .log {
            width: 90%;
            max-width: 600px;
            height: 100px;
            background: rgba(0,0,0,0.8);
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            overflow-y: auto;
            border: 1px solid var(--gold);
            scrollbar-width: thin;
        }

        button {
            padding: 10px 20px;
            background: var(--gold);
            border: 2px solid #b8860b;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="stats">
            <div>📍 <span id="loc">Tortuga</span></div>
            <div>⚔️ Enemy: <span id="sunk">0</span>/17</div>
            <div>💖 Hull: <span id="hull">17</span>/17</div>
        </div>
        <div class="captain-notice" id="captain-wrap">
            Opponent: <span id="captain-name">Blackbeard</span>
        </div>
    </div>

    <div id="map-container">
        <div id="grid-root"></div>
    </div>

    <div class="log" id="ship-log">> Welcome to the high seas, Captain.</div>
    <button onclick="resetGame()">Abandon Voyage</button>

    <script>
        // --- Audio Logic (ZzFX Micro) ---
        const playSfx = (type) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            
            if(type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
            } else if(type === 'miss') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
            }
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        };

        const LOCATIONS = ["Tortuga", "Port Royal", "Shipwreck Cove", "Ocracoke Inlet", "Devil's Throat"];
        const CAPTAINS = ["Blackbeard", "Anne Bonny", "Calico Jack", "Sir Francis Drake", "L'Olonnais"];
        const SHIP_SIZES = [5, 4, 3, 3, 2];
        
        let level = 1;
        let gridSize = 10;
        let mapData = []; 
        let playerHull = 17;
        let enemyHull = 17;
        let bonusTurn = false;
        let gameOver = false;
        const tileSize = 48; 

        // AI Memory for Search & Destroy
        let aiTargetStack = [];

        function initLevel() {
            gridSize = 8 + level; 
            playerHull = 17;
            enemyHull = 17;
            gameOver = false;
            aiTargetStack = [];
            
            document.getElementById('loc').innerText = LOCATIONS[(level-1) % LOCATIONS.length];
            document.getElementById('captain-name').innerText = CAPTAINS[(level-1) % CAPTAINS.length];
            document.getElementById('hull').innerText = playerHull;
            document.getElementById('sunk').innerText = "0";

            generateMap();
            renderMap();
            log(`Level ${level}: Sea charts expanded to ${gridSize}x${gridSize}.`);
        }

        function generateMap() {
            mapData = Array.from({ length: gridSize }, () => Array(gridSize).fill(0));
            
            let islands = Math.floor(gridSize * 1.5);
            while(islands > 0) {
                let r = Math.floor(Math.random() * gridSize);
                let c = Math.floor(Math.random() * gridSize);
                if(mapData[r][c] === 0) {
                    mapData[r][c] = Math.random() < 0.2 ? 4 : 3;
                    islands--;
                }
            }
            placeFleet(1); // Player
            placeFleet(2); // Enemy
        }

        function placeFleet(type) {
            SHIP_SIZES.forEach(size => {
                let placed = false;
                while(!placed) {
                    let r = Math.floor(Math.random() * gridSize);
                    let c = Math.floor(Math.random() * gridSize);
                    let dir = Math.floor(Math.random() * 2); 
                    if(canFit(r, c, size, dir)) {
                        for(let i=0; i<size; i++) {
                            let nr = dir === 1 ? r + i : r;
                            let nc = dir === 0 ? c + i : c;
                            mapData[nr][nc] = type;
                        }
                        placed = true;
                    }
                }
            });
        }

        function canFit(r, c, size, dir) {
            for(let i=0; i<size; i++) {
                let nr = dir === 1 ? r + i : r;
                let nc = dir === 0 ? c + i : c;
                if(nr >= gridSize || nc >= gridSize || mapData[nr][nc] !== 0) return false;
            }
            return true;
        }

        function renderMap() {
            const root = document.getElementById('grid-root');
            root.innerHTML = '';
            
            // Container math to prevent clipping
            root.style.width = (gridSize * tileSize + (tileSize/2)) + "px";
            root.style.height = (gridSize * tileSize * 0.75 + (tileSize/4)) + "px";

            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hex';
                    const val = mapData[r][c];

                    const px = c * tileSize + (r % 2 ? tileSize / 2 : 0);
                    const py = r * (tileSize * 0.75);

                    hex.style.left = px + 'px';
                    hex.style.top = py + 'px';
                    hex.id = `t-${r}-${c}`;

                    if(val === 3 || val === 4) { hex.classList.add('island'); hex.innerText = '🏝️'; }
                    if(val === 1) { hex.classList.add('player-ship'); hex.innerText = '⛵'; }
                    
                    hex.onclick = () => handleMove(r, c, hex);
                    root.appendChild(hex);
                }
            }
        }

        function handleMove(r, c, el) {
            if(gameOver || mapData[r][c] === 1 || el.classList.contains('hit') || el.classList.contains('miss')) return;

            const val = mapData[r][c];
            if(val === 2) {
                mapData[r][c] = -1;
                el.classList.add('hit');
                el.innerText = '💥';
                enemyHull--;
                playSfx('hit');
                document.getElementById('sunk').innerText = 17 - enemyHull;
                log("Direct hit! Splinters fly everywhere.");
            } else if(val === 4) {
                el.classList.add('treasure');
                el.innerText = '💰';
                bonusTurn = true;
                log("Treasure chest found! The crew reloads instantly!");
            } else if(val === 3) {
                el.innerText = '⛰️';
                log("Your shot ricocheted off the rocks.");
            } else {
                el.classList.add('miss');
                el.innerText = '🌊';
                playSfx('miss');
                log("Splash! Saltwater in the eyes.");
            }

            checkGameEnd();
            
            if(!gameOver) {
                if(bonusTurn) {
                    bonusTurn = false;
                } else {
                    setTimeout(enemyTurn, 600);
                }
            }
        }

        function enemyTurn() {
            let r, c;
            if (aiTargetStack.length > 0) {
                // Search nearby previous hit
                let target = aiTargetStack.pop();
                r = target.r; c = target.c;
            } else {
                // Hunt mode
                do {
                    r = Math.floor(Math.random() * gridSize);
                    c = Math.floor(Math.random() * gridSize);
                } while(mapData[r][c] < 0 || mapData[r][c] === 3 || mapData[r][c] === 4 || mapData[r][c] === 2);
            }

            const hex = document.getElementById(`t-${r}-${c}`);
            if(!hex) return enemyTurn(); // Fallback for invalid AI picks

            if(mapData[r][c] === 1) {
                mapData[r][c] = -1;
                hex.classList.add('hit');
                hex.innerText = '🔥';
                playerHull--;
                playSfx('hit');
                document.getElementById('map-container').classList.add('shake');
                setTimeout(() => document.getElementById('map-container').classList.remove('shake'), 200);
                
                // Add neighbors to stack for next turn
                [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr, nc]) => {
                    if(nr>=0 && nr<gridSize && nc>=0 && nc<gridSize && mapData[nr][nc] >= 0 && mapData[nr][nc] !== 2) {
                        aiTargetStack.push({r: nr, c: nc});
                    }
                });

                document.getElementById('hull').innerText = playerHull;
                log("Hull breach! We're taking on water!");
            } else {
                hex.classList.add('miss');
                hex.innerText = '🌊';
                playSfx('miss');
                log("The enemy captain miscalculated the wind.");
            }
            checkGameEnd();
        }

        function checkGameEnd() {
            if(enemyHull <= 0) {
                gameOver = true;
                level++;
                setTimeout(() => {
                    alert(`VICTORY! ${CAPTAINS[(level-2)%CAPTAINS.length]} has struck their colors!`);
                    initLevel();
                }, 100);
            } else if(playerHull <= 0) {
                gameOver = true;
                setTimeout(() => {
                    alert("Your ship has found the locker. Game Over.");
                    resetGame();
                }, 100);
            }
        }

        function log(msg) {
            const l = document.getElementById('ship-log');
            l.innerHTML = `> ${msg}<br>${l.innerHTML}`;
        }

        function resetGame() {
            level = 1;
            initLevel();
        }

        initLevel();
    </script>
</body>
</html>
